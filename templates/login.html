<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<title>登录 - 问卷系统</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    background: #f5f5f5;
}

.page {
    position: fixed;
    left: 0;
    top: 0;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f5f5;
}

.login_card {
    width: 900px;
    height: 550px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
    position: relative;
}

.left {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 32px;
    color: white;
    overflow: hidden;
    background: linear-gradient(135deg, #5a67d8e6, #5a67d8, #5a67d8cc);
}

.right {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: #fff;
}

.brand {
    position: relative;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 18px;
    font-weight: 600;
}

.brand-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
}

.brand-icon svg {
    width: 16px;
    height: 16px;
}

.characters-area {
    position: relative;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 350px;
}

.characters-img {
    width: 100%;
    max-width: 300px;
    opacity: 0.9;
}

.footer-links {
    position: relative;
    z-index: 20;
    display: flex;
    gap: 32px;
    font-size: 14px;
}

.footer-links a {
    color: rgba(255,255,255,0.6);
    transition: color 0.2s;
    text-decoration: none;
}

.footer-links a:hover {
    color: white;
}

.deco-grid {
    position: absolute;
    inset: 0;
    background-image: linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 20px 20px;
}

.deco-circle {
    position: absolute;
    border-radius: 50%;
    filter: blur(48px);
}

.deco-circle-1 {
    top: 25%;
    right: 25%;
    width: 256px;
    height: 256px;
    background: rgba(255,255,255,0.1);
}

.deco-circle-2 {
    bottom: 25%;
    left: 25%;
    width: 384px;
    height: 384px;
    background: rgba(255,255,255,0.05);
}

.form-wrapper {
    width: 100%;
    max-width: 420px;
}

.mobile-brand {
    display: none;
}

.login_header {
    text-align: center;
    margin-bottom: 24px;
}

.login_header h1 {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
}

.login_header p {
    color: #71717a;
    font-size: 14px;
}

.form {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.field {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.field label {
    font-size: 14px;
    font-weight: 500;
}

.field input {
    height: 42px;
    padding: 0 12px;
    border-radius: 6px;
    border: 1px solid #d4d4d8;
    font-size: 14px;
    outline: none;
    background: #fff;
    transition: border-color 0.2s;
    box-sizing: border-box;
}

.field input:focus {
    border-color: #4f46e5;
    box-shadow: 0 0 0 2px rgba(79,70,229,0.2);
}

.password-wrap {
    position: relative;
    width: 100%;
}

.password-wrap input {
    width: 100%;
    padding-right: 40px;
    box-sizing: border-box;
}

.eye-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #a1a1aa;
    transition: color 0.2s;
    cursor: pointer;
    z-index: 1;
}

.eye-btn:hover {
    color: #3f3f46;
}

.eye-btn svg {
    width: 20px;
    height: 20px;
}

input[type="password"]::-ms-reveal {
    display: none;
}

input[type="password"]::-webkit-textfield-decoration-container {
    display: none;
}

input[type="password"]::-webkit-credentials-auto-fill-button {
    display: none !important;
    visibility: hidden;
    pointer-events: none;
    position: absolute;
    right: 0;
}

.options {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 14px;
}

.remember {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
}

.remember input {
    width: 16px;
    height: 16px;
    accent-color: #4f46e5;
}

.forgot {
    color: #4f46e5;
    font-weight: 500;
    text-decoration: none;
}

.forgot:hover {
    text-decoration: underline;
}

.error-msg {
    padding: 12px;
    font-size: 14px;
    color: #f87171;
    background: rgba(127,29,29,0.08);
    border: 1px solid rgba(127,29,29,0.15);
    border-radius: 8px;
}

.btn-primary {
    width: 100%;
    height: 42px;
    font-size: 15px;
    font-weight: 500;
    border: none;
    border-radius: 6px;
    color: white;
    background: #5a67d8;
    transition: opacity 0.2s;
    cursor: pointer;
}

.btn-primary:hover {
    opacity: 0.9;
}

.btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.btn-google {
    width: 100%;
    height: 42px;
    margin-top: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border-radius: 6px;
    border: 1px solid #d4d4d8;
    background: #fff;
    font-size: 14px;
    transition: background 0.2s;
    cursor: pointer;
}

.btn-google:hover {
    background: #fafafa;
}

.btn-google svg {
    width: 20px;
    height: 20px;
}

.signup-link {
    text-align: center;
    font-size: 14px;
    color: #71717a;
    margin-top: 20px;
}

.signup-link a {
    color: #18181b;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
}

.signup-link a:hover {
    text-decoration: underline;
}

@media (max-width: 1023px) {
    .login_card {
        grid-template-columns: 1fr;
        width: 90%;
        height: auto;
        max-height: 90vh;
    }

    .left {
        display: none;
    }

    .mobile-brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 24px;
    }
}
</style>
</head>
<body>
<div class="page">
    <div class="login_card">
        <div class="left">
            <div class="brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path>
                    </svg>
                </div>
                <span>问卷系统</span>
            </div>
            <div class="characters-area">
                <svg class="characters-img" viewBox="0 0 300 200" fill="none">
                    <rect x="80" y="60" width="140" height="100" rx="8" fill="rgba(255,255,255,0.2)"/>
                    <rect x="90" y="70" width="60" height="30" rx="4" fill="rgba(255,255,255,0.3)"/>
                    <rect x="90" y="110" width="40" height="20" rx="3" fill="rgba(255,255,255,0.2)"/>
                    <rect x="140" y="110" width="40" height="20" rx="3" fill="rgba(255,255,255,0.2)"/>
                    <rect x="90" y="140" width="120" height="16" rx="3" fill="rgba(255,255,255,0.4)"/>
                    <circle cx="220" cy="50" r="30" fill="rgba(255,255,255,0.1)"/>
                    <circle cx="230" cy="40" r="20" fill="rgba(255,255,255,0.15)"/>
                    <circle cx="50" cy="150" r="25" fill="rgba(255,255,255,0.1)"/>
                </svg>
            </div>
            <div class="footer-links">
                <a href="#">隐私政策</a>
                <a href="#">服务条款</a>
                <a href="#">联系我们</a>
            </div>
            <div class="deco-grid"></div>
            <div class="deco-circle deco-circle-1"></div>
            <div class="deco-circle deco-circle-2"></div>
        </div>
        <div class="right">
            <div class="form-wrapper">
                <div class="mobile-brand">
                    <div class="brand-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path>
                        </svg>
                    </div>
                    <span>问卷系统</span>
                </div>
                <div class="login_header">
                    <h1>欢迎回来！</h1>
                    <p>请输入您的登录信息</p>
                </div>
                <form id="loginForm" class="form">
                    <div class="field">
                        <label for="login-email">邮箱</label>
                        <input id="login-email" type="email" placeholder="请输入邮箱" autocomplete="off" required />
                    </div>
                    <div class="field">
                        <label for="login-password">密码</label>
                        <div class="password-wrap">
                            <input id="login-password" type="password" placeholder="••••••••" required autocomplete="new-password" />
                            <button type="button" class="eye-btn" id="loginEyeBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="options">
                        <label class="remember"><input type="checkbox" id="remember" /> 记住我 30 天</label>
                        <a href="#" class="forgot">忘记密码？</a>
                    </div>
                    <div id="loginErrorMsg" class="error-msg" style="display: none;"></div>
                    <button type="submit" class="btn-primary">登录</button>
                </form>
                <button type="button" class="btn-google">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 11-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                    使用 Google 登录
                </button>
                <p class="signup-link">没有账号？ <a id="goRegister">去注册</a></p>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var loginForm = document.getElementById('loginForm');
    var loginEyeBtn = document.getElementById('loginEyeBtn');
    var loginPasswordInput = document.getElementById('login-password');
    var loginErrorMsg = document.getElementById('loginErrorMsg');
    var goRegister = document.getElementById('goRegister');

    function loadSavedFormData() {
        var savedEmail = localStorage.getItem('loginEmail');
        var savedPassword = localStorage.getItem('loginPassword');
        var savedRemember = localStorage.getItem('loginRemember');

        if (savedEmail) {
            document.getElementById('login-email').value = savedEmail;
        }
        if (savedPassword) {
            document.getElementById('login-password').value = savedPassword;
        }
        if (savedRemember === 'true') {
            document.getElementById('remember').checked = true;
        }
    }

    function saveFormData() {
        var email = document.getElementById('login-email').value;
        var password = document.getElementById('login-password').value;
        var remember = document.getElementById('remember').checked;

        localStorage.setItem('loginEmail', email);
        localStorage.setItem('loginPassword', password);
        localStorage.setItem('loginRemember', remember);
    }

    function clearFormData() {
        localStorage.removeItem('loginEmail');
        localStorage.removeItem('loginPassword');
        localStorage.removeItem('loginRemember');
    }

    loadSavedFormData();

    document.getElementById('login-email').addEventListener('input', saveFormData);
    document.getElementById('login-password').addEventListener('input', saveFormData);
    document.getElementById('remember').addEventListener('change', saveFormData);

    loginEyeBtn.addEventListener('click', function() {
        var type = loginPasswordInput.type === 'password' ? 'text' : 'password';
        loginPasswordInput.type = type;
        var svg = loginEyeBtn.querySelector('svg');
        if (type === 'text') {
            svg.innerHTML = '<path d="M17 12a5 5 0 01-5 5 5.006 5.006 0 01-5-5 5 5 0 015-5 5.006 5.006 0 015 5zM12 12m-2 5h4m-4 0h4m-6-5a3 3 0 116 0 3 3 0 01-6 0"></path>';
        } else {
            svg.innerHTML = '<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
        }
    });

    loginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        var email = document.getElementById('login-email').value.trim();
        var password = loginPasswordInput.value;

        loginErrorMsg.style.display = 'none';

        if (!email) {
            loginErrorMsg.textContent = '请输入邮箱';
            loginErrorMsg.style.display = 'block';
            return;
        }
        if (!password) {
            loginErrorMsg.textContent = '请输入密码';
            loginErrorMsg.style.display = 'block';
            return;
        }
        if (email === 'admin@qq.com' && password === 'admin') {
            alert('登录成功！');
            clearFormData();
        } else {
            loginErrorMsg.textContent = '邮箱或密码错误';
            loginErrorMsg.style.display = 'block';
        }
    });

    goRegister.addEventListener('click', function() {
        saveFormData();
        window.location.href = 'register.html';
    });
});
</script>
</body>
</html>
